                  type: integer
                  description: 'Payment method mode (optional).'
                  example: 1
                  nullable: true
                note:
                  type: string
                  description: 'Note for the receipt voucher (optional). Must not be greater than 500 characters.'
                  example: 'Payment received for Package One'
                  nullable: true
              required:
                - invoice_id
                - customer_id
                - debit_ledger_id
                - amount
      security: []
