                  type: integer
                  description: 'The ID of the Invoice to link the receipt voucher to (source). The <code>invoice_id</code> of an existing record in the invoices table.'
                  example: 1
                customer_id:
                  type: integer
                  description: 'The customer ID from CRM. The service will find the associated ledger account (credit side). The <code>id</code> of an existing record in the crm table.'
                  example: 5
                debit_ledger_id:
                  type: integer
                  description: 'The debit ledger account ID for the receipt voucher (e.g., Cash/Bank). The <code>id</code> of an existing record in the ledger_of_accounts table.'
