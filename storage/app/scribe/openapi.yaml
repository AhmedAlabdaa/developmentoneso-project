                  example: 1
                customer_id:
                  type: integer
                  description: 'The customer ID from CRM. The service will find the associated ledger account for the debit side. The <code>id</code> of an existing record in the crm table.'
                  example: 5
                note:
                  type: string
                  description: 'Note for the journal header (optional). Must not be greater than 500 characters.'
                  example: 'Additional charges for services'
                  nullable: true
                lines:
                  type: array
                  description: 'Array of credit ledger lines with ledger_id and amount. Must have at least 1 items.'
                  example:
                    -
                      ledger_id: 10
                      amount: 100
                      note: 'Service charge'
                    -
                      ledger_id: 11
                      amount: 50
                      note: 'Processing fee'
                  items:
                    type: object
                    properties:
                      ledger_id:
                        type: integer
                        description: 'The ledger account ID for the credit side. The <code>id</code> of an existing record in the ledger_of_accounts table.'
                        example: 10
                      amount:
                        type: number
                        description: 'Amount to credit to this ledger. Must be at least 0.01.'
                        example: 100.0
                      note:
                        type: string
                        description: 'Note for this specific line (optional). Must not be greater than 255 characters.'
                        example: 'Service charge'
                        nullable: true
                    required:
