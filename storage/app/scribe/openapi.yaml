openapi: 3.0.3
info:
  title: 'Laravel API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'http://alebdaa.cloudledger.ae'
tags:
  -
    name: 'Bulk Journal Import'
    description: "\nAPIs for bulk importing journal vouchers via CSV."
  -
    name: 'Invoice Services'
    description: "\nAPIs for managing invoice services."
  -
    name: 'Journal Entries'
    description: "\nAPIs for managing journal entries (headers) with nested transaction lines."
  -
    name: 'Journal Transaction Lines'
    description: "\nAPIs for querying journal transaction lines from posted journal vouchers."
  -
    name: 'Ledger of Accounts'
    description: "\nAPIs for managing ledger accounts with filtering, sorting, and pagination."
  -
    name: 'Package 3 Modular'
    description: ''
  -
    name: 'Package One'
    description: "\nAPIs for creating Package One journal entries (financial impact only).\nInvoices are created separately via InvoiceController."
  -
    name: 'Receipt Vouchers'
    description: "\nAPIs for managing receipt vouchers with automatic journal entry creation."
  -
    name: 'Typing Transaction Government Invoices'
    description: "\nAPIs for managing Typing Transaction Government Invoices."
paths:
  /api/journals/bulk-import:
    post:
      summary: 'Bulk Import Journal Vouchers'
      operationId: bulkImportJournalVouchers
      description: "Import multiple journal entries from a CSV file. Each journal entry is grouped by posting_date.\n\nCSV columns:\n- ledger_name (required): Name of the ledger account\n- debit (required): Debit amount (use 0 if credit)\n- credit (required): Credit amount (use 0 if debit)\n- posting_date (required): Date in Y-m-d format\n- candidate_id (optional): Employee/candidate ID\n- note (optional): Transaction note"
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Import completed'
                  created_journals: 3
                  total_rows: 10
                  errors: []
                properties:
                  message:
                    type: string
                    example: 'Import completed'
                  created_journals:
                    type: integer
                    example: 3
                  total_rows:
                    type: integer
                    example: 10
                  errors:
                    type: array
                    example: []
      tags:
        - 'Bulk Journal Import'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 'The CSV file to import.'
              required:
                - file
      security: []
  /api/invoice-services:
    post:
      summary: 'Create Invoice Service'
      operationId: createInvoiceService
      description: 'Store a newly created resource in storage.'
      parameters: []
      responses: {  }
      tags:
        - 'Invoice Services'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                code:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'n'
                note:
                  type: string
                  description: 'Must not be greater than 1000 characters.'
                  example: g
                  nullable: true
                status:
                  type: boolean
                  description: ''
                  example: false
                type:
                  type: integer
                  description: ''
                  example: 1
                  enum:
                    - 1
                    - 2
                    - 3
                settings:
                  type: object
                  description: ''
                  example: null
                  properties: {  }
                  nullable: true
                lines:
                  type: array
                  description: ''
                  example: null
                  items:
                    type: object
                    nullable: true
                    properties:
                      ledger_account_id:
                        type: integer
                        description: 'The <code>id</code> of an existing record in the ledger_of_accounts table.'
                        example: 16
                      amount_debit:
                        type: number
                        description: 'Must be at least 0.'
                        example: 39
                        nullable: true
                      amount_credit:
                        type: number
                        description: 'Must be at least 0.'
                        example: 84
                        nullable: true
                      vatable:
                        type: boolean
                        description: ''
                        example: true
                      note:
                        type: string
                        description: 'Must not be greater than 255 characters.'
                        example: z
                        nullable: true
                      source_amount:
                        type: integer
                        description: ''
                        example: 2
                        enum:
                          - 1
                          - 2
                    required:
                      - ledger_account_id
                      - source_amount
              required:
                - name
                - code
                - type
      security: []
  '/api/invoice-services/{id}':
    put:
      summary: 'Update Invoice Service'
      operationId: updateInvoiceService
      description: 'Update the specified resource in storage.'
      parameters: []
      responses: {  }
      tags:
        - 'Invoice Services'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                code:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'n'
                note:
                  type: string
                  description: 'Must not be greater than 1000 characters.'
                  example: g
                  nullable: true
                status:
                  type: boolean
                  description: ''
                  example: true
                type:
                  type: integer
                  description: ''
                  example: 3
                  enum:
                    - 1
                    - 2
                    - 3
                settings:
                  type: object
                  description: ''
                  example: null
                  properties: {  }
                  nullable: true
                lines:
                  type: array
                  description: ''
                  example: null
                  items:
                    type: object
                    nullable: true
                    properties:
                      id:
                        type: string
                        description: 'The <code>id</code> of an existing record in the invoice_service_lines table.'
                        example: null
                        nullable: true
                      ledger_account_id:
                        type: integer
                        description: 'The <code>id</code> of an existing record in the ledger_of_accounts table.'
                        example: 16
                      amount_debit:
                        type: number
                        description: 'Must be at least 0.'
                        example: 39
                        nullable: true
                      amount_credit:
                        type: number
                        description: 'Must be at least 0.'
                        example: 84
                        nullable: true
                      vatable:
                        type: boolean
                        description: ''
                        example: true
                      note:
                        type: string
                        description: 'Must not be greater than 255 characters.'
                        example: z
                        nullable: true
                      source_amount:
                        type: integer
                        description: ''
                        example: 2
                        enum:
                          - 1
                          - 2
                    required:
                      - ledger_account_id
      security: []
    delete:
      summary: 'Delete Invoice Service'
      operationId: deleteInvoiceService
      description: 'Remove the specified resource from storage.'
      parameters: []
      responses: {  }
      tags:
        - 'Invoice Services'
      security: []
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the invoice service.'
        example: architecto
        required: true
        schema:
          type: string
  /api/journals:
    post:
      summary: 'Create a new journal entry'
      operationId: createANewJournalEntry
      description: 'Store a newly created journal entry with nested transaction lines.'
      parameters: []
      responses: {  }
      tags:
        - 'Journal Entries'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                posting_date:
                  type: date
                  description: 'The posting date.'
                  example: '2026-01-07'
                status:
                  type: integer
                  description: 'The status: 0=Draft, 1=Posted, 2=Void.'
                  example: 0
                source_type:
                  type: string
                  description: 'optional Source model type.'
                  example: App\Models\Invoice
                  nullable: true
                source_id:
                  type: integer
                  description: 'optional Source model ID.'
                  example: 123
                  nullable: true
                pre_src_type:
                  type: string
                  description: 'optional Previous source type.'
                  example: App\Models\Order
                  nullable: true
                pre_src_id:
                  type: integer
                  description: 'optional Previous source ID.'
                  example: 456
                  nullable: true
                note:
                  type: string
                  description: 'optional Journal notes.'
                  example: 'Monthly payment entry'
                  nullable: true
                meta_json:
                  type: object
                  description: 'optional Additional metadata.'
                  example:
                    reference: PAY-001
                  properties: {  }
                  nullable: true
                created_by:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the users table.'
                  example: 16
                lines:
                  type: array
                  description: 'Array of transaction lines (minimum 2). Total debits must equal total credits.'
                  example:
                    - architecto
                  items:
                    type: string
              required:
                - posting_date
                - status
                - created_by
                - lines
      security: []
  '/api/journals/{id}':
    put:
      summary: 'Update a journal entry'
      operationId: updateAJournalEntry
      description: 'Update the details of a specific journal entry and its nested lines.'
      parameters: []
      responses: {  }
      tags:
        - 'Journal Entries'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                posting_date:
                  type: date
                  description: 'optional The posting date.'
                  example: '2026-01-08'
                status:
                  type: integer
                  description: 'optional The status: 0=Draft, 1=Posted, 2=Void.'
                  example: 1
                source_type:
                  type: string
                  description: 'Source model type. Must not be greater than 255 characters.'
                  example: App\Models\Invoice
                  nullable: true
                source_id:
                  type: integer
                  description: 'Source model ID.'
                  example: 123
                  nullable: true
                pre_src_type:
                  type: string
                  description: 'Previous source type. Must not be greater than 255 characters.'
                  example: App\Models\Order
                  nullable: true
                pre_src_id:
                  type: integer
                  description: 'Previous source ID.'
                  example: 456
                  nullable: true
                note:
                  type: string
                  description: 'optional Journal notes.'
                  example: 'Updated entry'
                  nullable: true
                meta_json:
                  type: object
                  description: 'Additional metadata.'
                  example:
                    reference: PAY-001
                  properties: {  }
                  nullable: true
                lines:
                  type: array
                  description: "optional Array of transaction lines. Include 'id' to update existing lines, omit to create new ones."
                  example:
                    - architecto
                  items:
                    type: string
      security: []
    delete:
      summary: 'Delete a journal entry'
      operationId: deleteAJournalEntry
      description: 'Remove a specific journal entry and its transaction lines from the database.'
      parameters: []
      responses: {  }
      tags:
        - 'Journal Entries'
      security: []
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the journal entry.'
        example: 1
        required: true
        schema:
          type: integer
  /api/journal-tran-lines/bulk-update-status:
    post:
      summary: 'Bulk update journal status'
      operationId: bulkUpdateJournalStatus
      description: 'Update the status of multiple journal headers by their IDs.'
      parameters: []
      responses: {  }
      tags:
        - 'Journal Transaction Lines'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  description: 'The <code>id</code> of an existing record in the journal_headers table.'
                  example:
                    - 16
                  items:
                    type: integer
                status:
                  type: integer
                  description: ''
                  example: 0
                  enum:
                    - 0
                    - 1
                    - 2
              required:
                - status
      security: []
  /api/ledgers:
    post:
      summary: 'Create a new ledger account'
      operationId: createANewLedgerAccount
      description: 'Store a newly created ledger account in the database.'
      parameters: []
      responses: {  }
      tags:
        - 'Ledger of Accounts'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'The name of the ledger account.'
                  example: 'Cash Account'
                class:
                  type: integer
                  description: 'The class of the ledger account.'
                  example: 1
                sub_class:
                  type: integer
                  description: 'The sub-class of the ledger account.'
                  example: 0
                group:
                  type: string
                  description: 'optional The group.'
                  example: Assets
                  nullable: true
                spacial:
                  type: integer
                  description: 'Spacial value.'
                  example: 0
                type:
                  type: string
                  description: 'The type (dr or cr).'
                  example: dr
                note:
                  type: string
                  description: 'optional Additional notes.'
                  example: 'Main cash account'
                  nullable: true
                created_by:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the users table.'
                  example: 16
                updated_by:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the users table.'
                  example: 16
              required:
                - name
                - class
                - sub_class
                - spacial
                - type
                - created_by
                - updated_by
      security: []
  '/api/ledgers/{id}':
    put:
      summary: 'Update a ledger account'
      operationId: updateALedgerAccount
      description: 'Update the details of a specific ledger account.'
      parameters: []
      responses: {  }
      tags:
        - 'Ledger of Accounts'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'The name of the ledger account.'
                  example: 'Updated Cash Account'
                class:
                  type: integer
                  description: 'The class of the ledger account.'
                  example: 1
                sub_class:
                  type: integer
                  description: 'The sub-class of the ledger account.'
                  example: 0
                group:
                  type: string
                  description: 'optional The group.'
                  example: Assets
                  nullable: true
                spacial:
                  type: integer
                  description: 'Spacial value.'
                  example: 0
                type:
                  type: string
                  description: 'The type (dr or cr).'
                  example: dr
                note:
                  type: string
                  description: 'optional Additional notes.'
                  example: 'Updated notes'
                  nullable: true
                created_by:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the users table.'
                  example: 16
                updated_by:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the users table.'
                  example: 16
              required:
                - name
                - class
                - sub_class
                - spacial
                - type
                - created_by
                - updated_by
      security: []
    delete:
      summary: 'Delete a ledger account'
      operationId: deleteALedgerAccount
      description: 'Remove a specific ledger account from the database.'
      parameters: []
      responses: {  }
      tags:
        - 'Ledger of Accounts'
      security: []
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the ledger account.'
        example: 1
        required: true
        schema:
          type: integer
  /api/am-monthly-contracts/lookup-employees:
    get:
      summary: 'Lookup employees (maids).'
      operationId: lookupEmployeesmaids
      description: 'Search employees by name for autocomplete. Returns id and name only.'
      parameters:
        -
          in: query
          name: search
          description: 'Search term to match against maid name.'
          example: maria
          required: false
          schema:
            type: string
            description: 'Search term to match against maid name.'
            example: maria
        -
          in: query
          name: limit
          description: 'Maximum number of results. Default: 20.'
          example: 10
          required: false
          schema:
            type: integer
            description: 'Maximum number of results. Default: 20.'
            example: 10
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 5
                    name:
                      type: string
                      example: 'Maria Santos'
                example:
                  -
                    id: 5
                    name: 'Maria Santos'
                  -
                    id: 12
                    name: 'Maria Garcia'
      tags:
        - 'Package 3 Modular'
      security: []
  /api/am-monthly-contracts/lookup-all-employees:
    get:
      summary: 'Lookup all employees (maids).'
      operationId: lookupAllEmployeesmaids
      description: 'Search all employees by name for autocomplete. Returns id and name only.'
      parameters:
        -
          in: query
          name: search
          description: 'Search term to match against employee name.'
          example: maria
          required: false
          schema:
            type: string
            description: 'Search term to match against employee name.'
            example: maria
        -
          in: query
          name: limit
          description: 'Maximum number of results. Default: 20.'
          example: 10
          required: false
          schema:
            type: integer
            description: 'Maximum number of results. Default: 20.'
            example: 10
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 5
                    name:
                      type: string
                      example: 'Maria Santos'
                example:
                  -
                    id: 5
                    name: 'Maria Santos'
                  -
                    id: 12
                    name: 'Maria Garcia'
      tags:
        - 'Package 3 Modular'
      security: []
  /api/am-monthly-contracts/lookup-customers:
    get:
      summary: 'Lookup customers (CRM).'
      operationId: lookupCustomersCRM
      description: "Search customers by name, mobile, or CL number for autocomplete.\nReturns CRM IDs (not ledger IDs). Same response format as /api/ledgers/lookup-customers."
      parameters:
        -
          in: query
          name: search
          description: 'Search by name, mobile, CL number.'
          example: ahmed
          required: false
          schema:
            type: string
            description: 'Search by name, mobile, CL number.'
            example: ahmed
        -
          in: query
          name: page
          description: 'Page number.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Page number.'
            example: 1
        -
          in: query
          name: per_page
          description: 'Items per page. Default: 10.'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Items per page. Default: 10.'
            example: 20
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  results:
                    -
                      id: 5
                      text: 'Ahmed Ali'
                      mobile: '0501234567'
                      crm:
                        first_name: Ahmed
                        last_name: Ali
                        mobile: '0501234567'
                        CL_Number: CL-001
                  pagination:
                    more: false
                    current_page: 1
                    total: 1
                properties:
                  results:
                    type: array
                    example:
                      -
                        id: 5
                        text: 'Ahmed Ali'
                        mobile: '0501234567'
                        crm:
                          first_name: Ahmed
                          last_name: Ali
                          mobile: '0501234567'
                          CL_Number: CL-001
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 5
                        text:
                          type: string
                          example: 'Ahmed Ali'
                        mobile:
                          type: string
                          example: '0501234567'
                        crm:
                          type: object
                          properties:
                            first_name:
                              type: string
                              example: Ahmed
                            last_name:
                              type: string
                              example: Ali
                            mobile:
                              type: string
                              example: '0501234567'
                            CL_Number:
                              type: string
                              example: CL-001
                  pagination:
                    type: object
                    properties:
                      more:
                        type: boolean
                        example: false
                      current_page:
                        type: integer
                        example: 1
                      total:
                        type: integer
                        example: 1
      tags:
        - 'Package 3 Modular'
      security: []
  /api/am-monthly-contracts/employees:
    get:
      summary: 'List employees (maids).'
      operationId: listEmployeesmaids
      description: 'Returns a paginated list of employees with optional filters.'
      parameters:
        -
          in: query
          name: per_page
          description: 'Number of items per page. Default: 15.'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Number of items per page. Default: 15.'
            example: 20
        -
          in: query
          name: name
          description: 'Filter by employee name.'
          example: maria
          required: false
          schema:
            type: string
            description: 'Filter by employee name.'
            example: maria
        -
          in: query
          name: inside_status
          description: 'Filter by inside status (1 = Office, 4 = Hired).'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Filter by inside status (1 = Office, 4 = Hired).'
            example: 1
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  current_page: 1
                  data:
                    -
                      id: 5
                      name: 'Maria Santos'
                      inside_status: 1
                  last_page: 1
                  per_page: 15
                  total: 1
                properties:
                  current_page:
                    type: integer
                    example: 1
                  data:
                    type: array
                    example:
                      -
                        id: 5
                        name: 'Maria Santos'
                        inside_status: 1
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 5
                        name:
                          type: string
                          example: 'Maria Santos'
                        inside_status:
                          type: integer
                          example: 1
                  last_page:
                    type: integer
                    example: 1
                  per_page:
                    type: integer
                    example: 15
                  total:
                    type: integer
                    example: 1
      tags:
        - 'Package 3 Modular'
      security: []
  /api/am-monthly-contracts/all-employees:
    get:
      summary: 'List all employees (maids).'
      operationId: listAllEmployeesmaids
      description: 'Returns a paginated list of employees with optional filters.'
      parameters:
        -
          in: query
          name: per_page
          description: 'Number of items per page. Default: 15.'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Number of items per page. Default: 15.'
            example: 20
        -
          in: query
          name: name
          description: 'Filter by employee name.'
          example: maria
          required: false
          schema:
            type: string
            description: 'Filter by employee name.'
            example: maria
        -
          in: query
          name: inside_status
          description: "Filter by maid status enum:\n0 = Pending, 1 = Office, 2 = Hired, 3 = Incidented."
          example: 1
          required: false
          schema:
            type: integer
            description: "Filter by maid status enum:\n0 = Pending, 1 = Office, 2 = Hired, 3 = Incidented."
            example: 1
        -
          in: query
          name: nationality
          description: 'Filter by nationality.'
          example: Philippines
          required: false
          schema:
            type: string
            description: 'Filter by nationality.'
            example: Philippines
        -
          in: query
          name: payment_type
          description: 'Filter by payment type.'
          example: bank
          required: false
          schema:
            type: string
            description: 'Filter by payment type.'
            example: bank
        -
          in: query
          name: passport_no
          description: 'Filter by passport number (partial match).'
          example: P12345
          required: false
          schema:
            type: string
            description: 'Filter by passport number (partial match).'
            example: P12345
        -
          in: query
          name: emirates_id
          description: 'Filter by Emirates ID (partial match).'
          example: 784-
          required: false
          schema:
            type: string
            description: 'Filter by Emirates ID (partial match).'
            example: 784-
        -
          in: query
          name: reference_no
          description: 'Filter by reference number (partial match).'
          example: EMP-0001
          required: false
          schema:
            type: string
            description: 'Filter by reference number (partial match).'
            example: EMP-0001
        -
          in: query
          name: inside_country_or_outside
          description: 'Filter by location status (1 = Outside, 2 = Inside).'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Filter by location status (1 = Outside, 2 = Inside).'
            example: 1
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  current_page: 1
                  data:
                    -
                      id: 5
                      name: 'Maria Santos'
                  last_page: 1
                  per_page: 15
                  total: 1
                properties:
                  current_page:
                    type: integer
                    example: 1
                  data:
                    type: array
                    example:
                      -
                        id: 5
                        name: 'Maria Santos'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 5
                        name:
                          type: string
                          example: 'Maria Santos'
                  last_page:
                    type: integer
