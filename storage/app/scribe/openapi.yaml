      description: "Create a charging journal entry with custom lines (ledger_id with debit/credit amounts).\nThe invoice is referenced as the source."
      parameters: []
      responses: {  }
      tags:
        - 'Package One'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                invoice_id:
                  type: integer
