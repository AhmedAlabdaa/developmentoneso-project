    post:
      summary: 'Create Received Voucher for Package One'
      operationId: createReceivedVoucherForPackageOne
      description: "Create a receipt voucher for Package One, linked to an Invoice as source.\nThe customer's ledger account is used as the credit side, and the provided\ndebit_ledger_id is used as the debit side (e.g., Cash/Bank)."
      parameters: []
      responses: {  }
      tags:
        - 'Package One'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                invoice_id:
                  type: integer
                  description: 'The ID of the Invoice to link the receipt voucher to (source). The <code>invoice_id</code> of an existing record in the invoices table.'
                  example: 1
                customer_id:
                  type: integer
                  description: 'The customer ID from CRM. The service will find the associated ledger account (credit side). The <code>id</code> of an existing record in the crm table.'
                  example: 5
                debit_ledger_id:
                  type: integer
                  description: 'The debit ledger account ID for the receipt voucher (e.g., Cash/Bank). The <code>id</code> of an existing record in the ledger_of_accounts table.'
                  example: 2
                amount:
                  type: number
                  description: 'Amount received from customer. Must be at least 0.01.'
                  example: 500.0
                method_mode:
                  type: integer
                  description: 'Payment method mode (optional).'
                  example: 1
                  nullable: true
                note:
                  type: string
                  description: 'Note for the receipt voucher (optional). Must not be greater than 500 characters.'
                  example: 'Payment received for Package One'
                  nullable: true
              required:
                - invoice_id
                - customer_id
                - debit_ledger_id
                - amount
