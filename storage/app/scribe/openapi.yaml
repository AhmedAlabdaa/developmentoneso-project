tags:
  -
    name: 'Bulk Journal Import'
    description: "\nAPIs for bulk importing journal vouchers via CSV."
  -
    name: 'Invoice Services'
    description: "\nAPIs for managing invoice services."
  -
    name: 'Journal Entries'
    description: "\nAPIs for managing journal entries (headers) with nested transaction lines."
  -
    name: 'Journal Transaction Lines'
    description: "\nAPIs for querying journal transaction lines from posted journal vouchers."
  -
    name: 'Ledger of Accounts'
    description: "\nAPIs for managing ledger accounts with filtering, sorting, and pagination."
  -
    name: 'Package One'
    description: "\nAPIs for creating Package One journal entries (financial impact only).\nInvoices are created separately via InvoiceController."
  -
    name: 'Receipt Vouchers'
    description: "\nAPIs for managing receipt vouchers with automatic journal entry creation."
  -
    name: 'Statement of Account'
    description: "\nAPIs for retrieving statement of account for a ledger."
  -
    name: 'Trial Balance'
    description: "\nAPIs for retrieving trial balance report data."
  -
    name: 'Typing Transaction Government Invoices'
    description: "\nAPIs for managing Typing Transaction Government Invoices."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can retrieve your token by logging in to the application. Use Laravel Sanctum for authentication.'
security:
  -
    default: []
paths:
  /api/journals/bulk-import:
    post:
      summary: 'Bulk Import Journal Vouchers'
      operationId: bulkImportJournalVouchers
      description: "Import multiple journal entries from a CSV file. Each journal entry is grouped by posting_date.\n\nCSV columns:\n- ledger_name (required): Name of the ledger account\n- debit (required): Debit amount (use 0 if credit)\n- credit (required): Credit amount (use 0 if debit)\n- posting_date (required): Date in Y-m-d format\n- candidate_id (optional): Employee/candidate ID\n- note (optional): Transaction note"
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Import completed'
                  created_journals: 3
                  total_rows: 10
                  errors: []
                properties:
                  message:
                    type: string
                    example: 'Import completed'
                  created_journals:
                    type: integer
                    example: 3
                  total_rows:
                    type: integer
                    example: 10
                  errors:
                    type: array
                    example: []
      tags:
        - 'Bulk Journal Import'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 'The CSV file to import.'
              required:
                - file
  /api/invoice-services/lookup:
    get:
      summary: 'Lookup Invoice Services'
      operationId: lookupInvoiceServices
      description: "Get a simplified list of invoice services for dropdowns, including nested lines.\nReturns format: {id, text, lines: [...]}"
      parameters:
        -
          in: query
          name: search
          description: 'Search by name or code.'
          example: 'Service A'
          required: false
          schema:
            type: string
            description: 'Search by name or code.'
            example: 'Service A'
        -
          in: query
          name: type
          description: 'Filter by service type.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Filter by service type.'
            example: 1
        -
          in: query
          name: page
          description: 'Page number.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Page number.'
            example: 1
        -
          in: query
          name: per_page
          description: 'Items per page (max 50).'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Items per page (max 50).'
            example: 20
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  results: []
                  pagination:
                    more: false
                    current_page: 1
                    total: 0
                properties:
                  results:
                    type: array
                    example: []
                  pagination:
                    type: object
                    properties:
                      more:
                        type: boolean
                        example: false
                      current_page:
                        type: integer
                        example: 1
                      total:
                        type: integer
                        example: 0
      tags:
        - 'Invoice Services'
